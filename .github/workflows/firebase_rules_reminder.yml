name: Firebase Rules Expiry Reminder

on:
  schedule:
    - cron: "0 0 1 12 *"   # 12월 1일 KST 09:00 (UTC 00:00)
    - cron: "0 0 15 12 *"  # 12월 15일
    - cron: "0 0 25 12 *"  # 12월 25일
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram reminder
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, requests, datetime
          token = os.environ["BOT_TOKEN"]
          chat_id = os.environ["CHAT_ID"]
          expire = datetime.date(2027, 12, 31)
          today = datetime.date.today()
          days_left = (expire - today).days
          msg = (
              "\U0001f525 <b>Firebase 보안 규칙 만료 임박!</b>\n\n"
              f"\U0001f4c5 만료일: <b>2027-12-31</b>\n"
              f"\u23f3 남은 기간: <b>{days_left}일</b>\n\n"
              "Firebase Console에서 규칙을 갱신해 주세요.\n"
              "https://console.firebase.google.com/project/smartswing-sec/firestore/databases/-default-/security/rules\n\n"
              "<code>allow read, write: if request.time &lt; timestamp.date(2028, 12, 31);</code>"
          )
          r = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg, "parse_mode": "HTML"},
              timeout=15
          )
          print(r.status_code, r.text)
          PYEOF
