# ══════════════════════════════════════════════════════════════
#  SmartSwing-SEC  ·  자동 빌드 + GitHub Pages 배포
#
#  트리거: main 브랜치 push 시마다 자동 실행
#  결과:  https://plnman.github.io/smartswing-sec/
# ══════════════════════════════════════════════════════════════
name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: "🔨 Vite 빌드"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 의존성 설치
        run: npm install

      - name: Vite 빌드
        env:
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run build

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: "🚀 GitHub Pages 배포"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: "📨 배포 완료 Telegram 알림"
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Telegram 알림 전송
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python3 - <<'PYEOF'
          import os, requests
          token   = os.environ["BOT_TOKEN"]
          chat_id = os.environ["CHAT_ID"]
          status  = os.environ["DEPLOY_STATUS"]
          sha     = os.environ["GITHUB_SHA"][:7]
          actor   = os.environ["GITHUB_ACTOR"]
          icon = "✅" if status == "success" else "❌"
          msg = (
              f"{icon} <b>SmartSwing-SEC 배포 {status.upper()}</b>\n\n"
              f"🔗 https://plnman.github.io/smartswing-sec/\n"
              f"📝 커밋: <code>{sha}</code>\n"
              f"👤 작성자: {actor}"
          )
          r = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg, "parse_mode": "HTML"},
              timeout=15
          )
          print(r.status_code, r.text)
          PYEOF
